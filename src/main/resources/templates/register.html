<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>

<h2>Register</h2>

<form th:action="@{/register}" method="post">

    <input
            type="text"
            name="name"
            placeholder="Enter Name"
            required
    >

    <br><br>

    <input
            type="email"
            name="email"
            placeholder="Enter Email"
            required
    >

    <br><br>

    <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
    >

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

<br>

<a th:href="@{/login}">
    Login Here
</a>

</body>
</html>
