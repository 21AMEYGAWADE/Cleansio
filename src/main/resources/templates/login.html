<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login | Data Cleaner Pro</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-indigo-900 flex items-center justify-center px-4">

<div class="w-full max-w-md">

    <!-- CARD -->
    <div class="bg-white/95 backdrop-blur-lg shadow-2xl rounded-3xl overflow-hidden">

        <!-- HEADER -->
        <div class="bg-gradient-to-r from-blue-700 to-indigo-700 px-8 py-10 text-center">

            <h1 class="text-4xl font-extrabold text-white tracking-wide">
                Data Cleaner Pro
            </h1>

            <p class="text-blue-100 mt-3 text-sm">
                Secure login to your dashboard
            </p>

        </div>

        <!-- FORM SECTION -->
        <div class="p-8">

            <!-- ERROR MESSAGE -->
            <div th:if="${param.error}"
                 class="bg-red-100 border border-red-300 text-red-700 px-4 py-3 rounded-xl mb-5 text-sm">

                Invalid Email or Password

            </div>

            <!-- LOGOUT MESSAGE -->
            <div th:if="${param.logout}"
                 class="bg-green-100 border border-green-300 text-green-700 px-4 py-3 rounded-xl mb-5 text-sm">

                Logged out successfully

            </div>

            <!-- LOGIN FORM -->
            <form action="/login"
                  method="post"
                  class="space-y-6">

                <!-- EMAIL -->
                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Email Address
                    </label>

                    <input
                            type="email"
                            name="username"
                            placeholder="Enter your email"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition"
                    >

                </div>

                <!-- PASSWORD -->
                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Password
                    </label>

                    <input
                            type="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition"
                    >

                </div>

                <!-- LOGIN BUTTON -->
                <button type="submit"
                        class="w-full bg-gradient-to-r from-blue-700 to-indigo-700 hover:from-blue-800 hover:to-indigo-800 text-white py-3 rounded-xl font-semibold shadow-lg transition duration-300">

                    Login

                </button>

            </form>

            <!-- REGISTER -->
            <div class="mt-8 text-center">

                <p class="text-gray-600 text-sm">
                    Don't have an account?
                </p>

                <a th:href="@{/register}"
                   class="inline-block mt-2 text-blue-700 font-semibold hover:text-indigo-700 hover:underline transition">

                    Create Account

                </a>

            </div>

        </div>

    </div>

    <!-- FOOTER -->
    <p class="text-center text-gray-300 text-sm mt-6">
        © 2026 Data Cleaner Pro • Smart Dataset Cleaning Platform
    </p>

</div>

</body>
</html>
